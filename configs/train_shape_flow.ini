[paths]
# Paths may be absolute or relative to this config file.
# data is a structured .npy array with e1_t, e2_t, e1, e2, hlf, mag, snr.
data = ../training_arrays.npy
output = ../checkpoints/shape_flow.pt
# resume_checkpoint = ../checkpoints/shape_flow.pt

# Alternative to data:
# e_true = ../e_true.npy
# e_meas = ../e_meas.npy
# cond = ../cond.npy

[training]
stop_after_epoch = 20
maximum_training_epoch = 100
batch_size = 512
val_fraction = 0.2
learning_rate = 1.0e-3
weight_decay = 1.0e-4
grad_clip_norm = 5.0
seed = 0
# device = cpu

[model]
transforms = 5
hidden_features = 128, 128
bins = 8
