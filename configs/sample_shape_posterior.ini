[paths]
# Paths may be absolute or relative to this config file.
checkpoint = ../checkpoints/shape_flow.pt
output = ../posterior_samples.npz
data = ../training_arrays.npz

[observation]
# Used when [paths] data is set.
index = 0

# Alternative to data/index:
# e_meas = 0.02, -0.04
# cond = 35.0, 1.2, 23.1

[mcmc]
n_walkers = 32
n_steps = 1000
burn_in = 200
thin = 1
initial_scale = 0.03
prior_radius = 0.999
seed = 0
progress = false
verbose = false
light_mode = false

[runtime]
device = cpu
